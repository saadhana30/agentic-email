<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaSphere Agent — Login</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f1117;
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
    }

    .login-card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .brand {
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.5px;
    }

    .login-logo .tagline {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .login-card h2 {
      font-size: 20px;
      font-weight: 600;
      color: #e2e8f0;
      margin: 0 0 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #6366f1;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .remember-row input[type="checkbox"] {
      accent-color: #6366f1;
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .remember-row label {
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
      margin: 0;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #4f52d9; }
    .btn-login:disabled { background: #3b3e6b; cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">NovaSphere Agent</div>
      <div class="tagline">Agentic Email Operations Platform</div>
    </div>

    <h2>Sign in</h2>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required />
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember-me" />
        <label for="remember-me">Remember me</label>
      </div>

      <button type="submit" class="btn-login" id="login-btn">Sign in</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script>
    // If already logged in, redirect to dashboard
    (function() {
      const token = localStorage.getItem("access_token") || sessionStorage.getItem("access_token");
      if (token) window.location.replace("/");
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn      = document.getElementById("login-btn");
      const errorEl  = document.getElementById("error-msg");
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const remember = document.getElementById("remember-me").checked;

      btn.disabled    = true;
      btn.textContent = "Signing in...";
      errorEl.classList.remove("visible");

      try {
        const formData = new FormData();
        formData.append("username", username);
        formData.append("password", password);

        const res = await fetch("/api/auth/login", {
          method: "POST",
          body: formData,
        });

        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || "Login failed");
        }

        const { access_token, refresh_token } = await res.json();

        const storage = remember ? localStorage : sessionStorage;
        storage.setItem("access_token",  access_token);
        storage.setItem("refresh_token", refresh_token);

        window.location.replace("/");
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add("visible");
        btn.disabled    = false;
        btn.textContent = "Sign in";
      }
    }
  </script>
</body>
</html>
